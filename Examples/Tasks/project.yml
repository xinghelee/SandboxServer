name: SandboxTasksDemo
options:
  bundleIdPrefix: com.sandboxserver
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  SandboxServer:
    # Two levels up: Examples/Tasks → repo root (the Swift package).
    path: ../../

targets:
  SandboxTasksDemo:
    type: application
    platform: iOS
    sources:
      - Sources
    info:
      path: Generated/Info.plist
      properties:
        CFBundleDisplayName: Tasks
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        # The embedded debug server is reachable over the LAN (bindingPolicy: .localNetwork):
        NSLocalNetworkUsageDescription: "Browse this app's sandbox, database, and network traffic during development."
        NSBonjourServices:
          - _sandboxserver._tcp
        # The app talks to a public sample API (jsonplaceholder) to seed + sync tasks:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    dependencies:
      # Like the other Demo, this sample links the real server PRODUCT directly so no SPM-trait
      # tooling is needed from a generated .xcodeproj. A PRODUCTION app would instead depend on the
      # `SandboxServer` facade and flip the `SandboxServerEnabled` trait in Xcode's Package
      # Dependencies pane — then Release builds link the inert no-op and the server cannot exist.
      - package: SandboxServer
        product: SandboxServerCore
      - package: SandboxServer
        product: SandboxServerAPI
    settings:
      base:
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.sandboxserver.tasks
